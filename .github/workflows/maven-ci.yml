name: Maven CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-source/devops2026-ufoTracker

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build and Test with Maven Wrapper
        run: ./mvnw clean verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: maven-build
          path: app-source/devops2026-ufoTracker/target/*.jar
          retention-days: 7