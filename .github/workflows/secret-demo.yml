name: Secret Demo Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-demo-job:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Secret Access
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: echo "API_KEY is set and ready to use."